<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jebllo · Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth">
    <!-- brand side -->
    <div class="auth__brandside">
      <div class="auth__logo">
        <span class="brand__mark"><img src="assets/logo.svg" alt="Jebllo" /></span>
        <span class="brand__name">Jebllo</span>
      </div>
      <div class="auth__pitch">
        <h2>Pilotez votre plateforme de livraison.</h2>
        <p>Commandes en temps réel, livreurs, restaurants partenaires et membres — tout au même endroit.</p>
      </div>
      <div class="auth__stats">
        <div class="auth__stat"><b>1 482</b><span>Commandes / mois</span></div>
        <div class="auth__stat"><b>38</b><span>Livreurs actifs</span></div>
        <div class="auth__stat"><b>26</b><span>Restaurants</span></div>
      </div>
    </div>

    <!-- form side -->
    <div class="auth__formside">
      <form class="auth__form" onsubmit="window.location.href='dashboard.html';return false;">
        <h1>Bon retour 👋</h1>
        <p class="sub">Connectez-vous à votre espace administrateur.</p>
        <div class="field">
          <label>Email</label>
          <input class="input" type="email" value="djihadderbal2015@gmail.com" placeholder="vous@jebllo.dz" required>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input class="input" type="password" value="••••••••" placeholder="Votre mot de passe" required>
        </div>
        <div class="auth__opts">
          <label><input type="checkbox" checked> Se souvenir de moi</label>
          <a href="#">Mot de passe oublié ?</a>
        </div>
        <button class="btn btn--lime" type="submit">Se connecter</button>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

  <script src="app.js"></script>
  <script>
    (function(){
      var DOT = { order:"lime", new:"lime", return:"info", driver:"info", create:"navy", update:"navy", delete:"danger", system:"" };
      function rel(ts){
        var s = Math.floor((Date.now()-ts)/1000);
        if (s < 60) return "à l'instant";
        if (s < 3600) return "il y a " + Math.floor(s/60) + " min";
        if (s < 86400) return "il y a " + Math.floor(s/3600) + " h";
        return new Date(ts).toLocaleDateString("fr-FR", {day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit"});
      }
      function render(){
        var logs = (window.Jebllo && Jebllo.getLogs()) || [];
        var tl = document.getElementById("log-timeline");
        if (!logs.length){ tl.innerHTML = '<div class="notif-empty">Aucune activité enregistrée.</div>'; return; }
        tl.innerHTML = logs.map(function(l){
          return '<div class="log-item"><span class="log-item__dot '+(DOT[l.type]||"")+'"></span>'
            + '<div class="log-item__title">'+l.title+'</div>'
            + '<div class="log-item__sub">'+(l.sub||"")+'</div>'
            + '<div class="log-item__time">'+rel(l.at)+'</div></div>';
        }).join("");
      }
      render();
      document.getElementById("clear-logs").addEventListener("click", function(){
        Jebllo.confirm({ title:"Effacer le journal", message:"Supprimer toutes les entrées du journal d'activité ?", confirmLabel:"Effacer",
          onConfirm:function(){ try{ localStorage.removeItem("jebllo_logs"); }catch(e){} render(); Jebllo.toast("Journal effacé","danger"); } });
      });
    })();
  </script>
